# .github/workflows/publish-npm.yml

name: CI and Publish Package

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type-check
        run: bun run typecheck

      - name: Build
        run: bun run build

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Determine npm dist-tag
        id: npm_dist_tag
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE="${VERSION#*-}"
            echo "DIST_TAG=${PRERELEASE%%.*}" >> "$GITHUB_OUTPUT"
          else
            echo "DIST_TAG=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify package version
        run: |
          EXPECTED_VERSION="${{ steps.get_version.outputs.VERSION }}"
          PACKAGE_JSON_VERSION="$(bun -e 'console.log(require("./package.json").version)')"

          echo "Git Tag Version: $EXPECTED_VERSION"
          echo "package.json Version: $PACKAGE_JSON_VERSION"
          if [[ "$EXPECTED_VERSION" != "$PACKAGE_JSON_VERSION" ]]; then
            echo "Error: package.json version ($PACKAGE_JSON_VERSION) does not match Git tag version ($EXPECTED_VERSION)."
            exit 1
          fi

      - name: Publish to npm
        run: bun publish --tag "${{ steps.npm_dist_tag.outputs.DIST_TAG }}" --access public
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
